<div class="flex flex-col items-start gap-10 justify-start">
  <div class="flex gap-4">
    <div class="bg-fuchsia-500 p-3 rounded-[10px] w-10 h-10 flex items-center justify-center">

        <a routerLink="/clientes">Clientes</a>

        <span class="bg-gray-700 w-6 text-[12px] text-center rounded-2xl">2</span>

      <li
